<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PhishGuard — Full Report</title>
  <link rel="stylesheet" href="report.css">
</head>
<body>
 
<div class="report-shell">
  <div class="report-topbar">
    <a href="#" class="back-link" onclick="window.close()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Close Report
    </a>
    <div class="report-brand">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ff4d4d" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <path d="m9 12 2 2 4-4"/>
      </svg>
      PHISHGUARD — THREAT REPORT
    </div>
    <div id="riskBadgeFull" class="risk-badge-top">—</div>
  </div>
 
  <div class="report-body">
    <div class="report-left">
      <div class="score-hero card">
        <div class="score-ring-wrap">
          <svg viewBox="0 0 140 140" width="140" height="140">
            <defs>
              <filter id="glow">
                <feGaussianBlur stdDeviation="3" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>
            <circle cx="70" cy="70" r="54" fill="none" stroke="#1a2540" stroke-width="8"/>
            <circle id="scoreArc" cx="70" cy="70" r="54" fill="none"
              stroke="#ff4d4d" stroke-width="8"
              stroke-linecap="round"
              stroke-dasharray="339.3" stroke-dashoffset="339.3"
              transform="rotate(-90 70 70)"
              filter="url(#glow)"
              style="transition: stroke-dashoffset 1.2s cubic-bezier(.17,.67,.35,1)"/>
          </svg>
          <div class="score-center">
            <div class="score-number" id="scoreNum">0%</div>
            <div class="score-label">PHISH RISK</div>
          </div>
        </div>
 
        <div class="score-meta">
          <div class="meta-item">
            <div class="meta-label">CONFIDENCE</div>
            <div id="metaConf" class="meta-val">—</div>
          </div>
          <div class="meta-divider"></div>
          <div class="meta-item">
            <div class="meta-label">STATUS</div>
            <div id="metaFallback" class="meta-val">LIVE</div>
          </div>
          <div class="meta-divider"></div>
          <div class="meta-item">
            <div class="meta-label">THREAT TYPE</div>
            <div id="metaType" class="meta-val">—</div>
          </div>
        </div>
      </div>
 
      <div class="card">
        <div class="card-title">Email Metadata</div>
        <div class="meta-row"><span class="meta-key">FROM</span><span class="meta-val-txt" id="rFrom">—</span></div>
        <div class="meta-row"><span class="meta-key">SUBJ</span><span class="meta-val-txt" id="rSubj">—</span></div>
      </div>
 
      <div class="card">
        <div class="card-title">Recommended Actions</div>
        <div id="actionContainer">
            </div>
      </div>
    </div>
 
    <div class="report-right">
      <div class="card">
        <div class="card-title">Detected Patterns & Evidence</div>
        <div class="findings-wrap" id="findingsList">
            </div>
      </div>
 
      <div class="card">
        <div class="card-title">AI Forensic Summary</div>
        <div class="reasoning-list" id="aiReasoning">
            </div>
      </div>
    </div>
  </div>
</div>
 
<script src="report.js"></script>
</body>
</html>
