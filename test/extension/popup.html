<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>PhishGuard.AI</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- VIEW: AUTH -->
  <div class="view active" id="v-auth">
    <div class="auth-wrap">
      <div class="brand">
        <div class="shield-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            <path d="m9 12 2 2 4-4"/>
          </svg>
        </div>
        <h1 class="brand-name">🛡️ PHISHGUARD</h1>
        <p class="brand-sub">THREAT INTELLIGENCE ENGINE</p>
      </div>

      <div class="divider-row">
        <span class="divider-line"></span>
        <span class="divider-txt">SECURE AUTH</span>
        <span class="divider-line"></span>
      </div>

      <button class="google-btn" id="signInBtn">
        <svg width="16" height="16" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </button>

      <div class="err-msg" id="authErr"></div>
    </div>
  </div>

  <!-- VIEW: DASHBOARD -->
  <div class="view" id="v-dash">
    <div class="header">
      <span>🛡️ PHISHGUARD</span>
      <span class="badge live-badge"><span class="live-dot"></span>LIVE</span>
    </div>

    <div class="dash-body">
      <button class="scan-btn" id="startScanBtn">
        <div class="scan-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </div>
        <div>
          <div class="scan-label">EVALUATE INBOX</div>
          <div class="scan-sub">Scans your 5 latest emails · ~3s</div>
        </div>
      </button>

      <div class="status-bar">
        <span id="statusTxt">⬤ Connected to Gmail</span>
        <span class="secure-txt">●●●●● SECURE</span>
      </div>
    </div>
  </div>

  <!-- VIEW: LOADING -->
  <div class="view" id="v-loading">
    <div class="loading-wrap">
      <div class="spinner">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ff4d4d" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 15c6.667-6 13.333 0 20-6"/>
          <path d="M9 22c1.798-1.998 2.518-3.995 2.807-5.993"/>
          <path d="M22 9c-4.667 4-9.333 4-14 8"/>
          <path d="M2 9c0 5.5 7 6 9 12"/>
          <path d="M22 15c0-5.5-7-6-9-12"/>
          <path d="M15 2c-1.798 1.998-2.518 3.995-2.807 5.993"/>
        </svg>
      </div>
      <div class="analyzing" id="dnaText">ANALYZING DNA...</div>
      <div class="scan-sub-txt">Fetching emails · scanning links · scoring threats</div>
      <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
    </div>
  </div>

  <!-- VIEW: EMAIL LIST -->
  <div class="view" id="v-list">
    <div class="header">
      <button class="back-btn" id="backToDash">← BACK</button>
      <span>INBOX RESULTS</span>
      <span style="width:56px"></span>
    </div>
    <div class="email-list" id="emailList"></div>
  </div>

  <!-- VIEW: REPORT -->
  <div class="view" id="v-report">
    <div class="header">
      <button class="back-btn" id="backToList">← BACK</button>
      <span>🛡️ PHISHGUARD</span>
      <span class="badge" id="riskBadge">Phishing</span>
    </div>

    <div class="circle">
      <h1 id="gaugeScore">0%</h1>
      <p>Phishing Probability</p>
    </div>

    <div class="alerts" id="findingsList"></div>

    <div class="meta-row"><span class="meta-key">FROM</span><span class="meta-val" id="rFrom">—</span></div>
    <div class="meta-row"><span class="meta-key">SUBJ</span><span class="meta-val" id="rSubj">—</span></div>

    <button class="full-report-btn" id="fullBtn">🔍 View Full Report</button>
  </div>

<script src="popup.js"></script>
</body>
</html>
